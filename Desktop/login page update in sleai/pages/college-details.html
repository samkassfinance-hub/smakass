<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Details - College Admission System</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .details-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .college-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .college-header h1 {
            margin: 0 0 15px 0;
            font-size: 2em;
        }
        .college-header p {
            margin: 5px 0;
            font-size: 1.1em;
        }
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .detail-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .detail-card h3 {
            color: #667eea;
            margin-top: 0;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .detail-item {
            margin-bottom: 15px;
        }
        .detail-label {
            font-weight: 700;
            color: #222;
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        .detail-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background-color: #764ba2;
        }
        .btn-secondary {
            background-color: #ddd;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #ccc;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .back-btn:hover {
            background-color: #764ba2;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1em;
            color: #666;
        }
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="details-container">
        <a href="colleges-result.html" class="back-btn">← Back to Results</a>
        
        <div id="collegeDetails">
            <div class="loading">Loading college details...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script src="../scripts/college-system.js"></script>
    <script>
        let dbData = null;

        async function initPage() {
            try {
                dbData = await window.collegeSystem.loadDatabase();
                const collegeName = sessionStorage.getItem('selectedCollege');
                const admissionType = sessionStorage.getItem('admissionType');
                
                if (!collegeName || !admissionType) {
                    window.location.href = 'colleges-result.html';
                    return;
                }

                displayCollegeDetails(collegeName, admissionType);
            } catch (error) {
                console.error('Error loading page:', error);
                showError('Error loading college details. Please go back and try again.');
            }
        }

        function displayCollegeDetails(collegeName, admissionType) {
            let colleges = [];

            if (admissionType === 'cutoff') {
                colleges = dbData.colleges.cutoff || [];
            } else if (admissionType === 'exam') {
                colleges = dbData.colleges.exam || [];
            } else if (admissionType === 'management') {
                colleges = dbData.colleges.management || [];
            }

            const college = colleges.find(c => c.college_name === collegeName);

            if (!college) {
                showError('College not found. Please go back and try again.');
                return;
            }

            const detailsHTML = `
                <div class="college-header">
                    <h1>${college.college_name}</h1>
                    <p>📍 ${college.location}</p>
                    <p>🎓 ${college.degree}</p>
                </div>

                <div class="details-grid">
                    <div class="detail-card">
                        <h3>Basic Information</h3>
                        <div class="detail-item">
                            <div class="detail-label"><strong>College Name</strong></div>
                            <div class="detail-value"><strong>${college.college_name}</strong></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label"><strong>Location</strong></div>
                            <div class="detail-value"><strong>${college.location}</strong></div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label"><strong>Degree</strong></div>
                            <div class="detail-value"><strong>${college.degree}</strong></div>
                        </div>
                    </div>

                    ${getAdmissionSpecificCard(college, admissionType)}
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="applyCollege('${college.college_name}')">
                        Apply Now
                    </button>
                    <button class="btn btn-secondary" onclick="window.history.back()">
                        Go Back
                    </button>
                </div>
            `;

            document.getElementById('collegeDetails').innerHTML = detailsHTML;
        }

        function getAdmissionSpecificCard(college, admissionType) {
            let cardHTML = '<div class="detail-card"><h3>Admission Details</h3>';

            if (admissionType === 'cutoff' && college.cutoff_range) {
                cardHTML += `
                    <div class="detail-item">
                        <div class="detail-label"><strong>Cutoff Range</strong></div>
                        <div class="detail-value"><strong>${college.cutoff_range}</strong></div>
                    </div>
                `;
            } else if (admissionType === 'exam' && college.exam_required) {
                cardHTML += `
                    <div class="detail-item">
                        <div class="detail-label"><strong>Entrance Exam</strong></div>
                        <div class="detail-value"><strong>${college.exam_required}</strong></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label"><strong>Score Range</strong></div>
                        <div class="detail-value"><strong>${college.score_range || 'N/A'}</strong></div>
                    </div>
                `;
            } else if (admissionType === 'management' && college.fee_range) {
                cardHTML += `
                    <div class="detail-item">
                        <div class="detail-label"><strong>Management Quota Fee</strong></div>
                        <div class="detail-value"><strong>₹${college.fee_range}</strong></div>
                    </div>
                `;
            }

            cardHTML += '</div>';
            return cardHTML;
        }

        function applyCollege(collegeName) {
            alert(`Application for ${collegeName} initiated!\n\nThis feature will be connected to the application system soon.`);
        }

        function showError(message) {
            const errorBox = document.getElementById('error');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            document.getElementById('collegeDetails').innerHTML = '';
        }

        initPage();
    </script>
</body>
</html>
