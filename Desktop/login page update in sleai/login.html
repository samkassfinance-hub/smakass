<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Let's Explore — CareerForge AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --primary: #f43f5e; --secondary: #8b5cf6;
    --bg-gradient: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 100%);
    --surface: #ffffff; --text-main: #0f172a; --text-muted: #4b5563; /* Darker muted text for better contrast */
    --radius-xl: 32px; --radius-lg: 16px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', sans-serif; background: #0f172a;
    height: 100dvh; overflow: hidden; display: flex; flex-direction: column; color: white;
    position: relative;
  }

  /* Animated Color Blobs */
  .bg-blob {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    filter: blur(80px); opacity: 0.5; z-index: -1;
    animation: blobMove 20s infinite alternate;
  }
  .blob1 { background: #f43f5e; top: -10%; left: -10%; animation-delay: 0s; }
  .blob2 { background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -5s; }
  .blob3 { background: #0ea5e9; top: 40%; left: 30%; animation-delay: -10s; }

  @keyframes blobMove {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(100px, 150px) scale(1.2); }
    66% { transform: translate(-100px, 80px) scale(0.8); }
    100% { transform: translate(0, 0) scale(1); }
  }

  .hero-container { 
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
    padding: 24px; text-align: center; z-index: 1;
    animation: floating 6s ease-in-out infinite;
  }
  
  @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

  .app-logo { 
    width: 90px; height: 90px; background: rgba(255,255,255,0.1); 
    backdrop-filter: blur(14px); border-radius: 24px; 
    display: flex; align-items: center; justify-content: center; 
    margin-bottom: 32px; padding: 4px; border: 2px solid rgba(255,255,255,0.3);
    animation: colorGlow 8s infinite alternate, logoPulse 4s infinite alternate;
  }
  .app-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
  
  @keyframes colorGlow {
    0% { border-color: #f43f5e; box-shadow: 0 0 30px #f43f5e; }
    50% { border-color: #8b5cf6; box-shadow: 0 0 30px #8b5cf6; }
    100% { border-color: #0ea5e9; box-shadow: 0 0 30px #0ea5e9; }
  }
  
  .headline { 
    font-family: 'Outfit', sans-serif; font-size: 54px; font-weight: 800; 
    letter-spacing: -2px; line-height: 1;
    background: linear-gradient(90deg, #f43f5e, #8b5cf6, #0ea5e9, #f43f5e);
    background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: textGradient 6s linear infinite;
    margin-bottom: 8px;
  }
  
  @keyframes textGradient { 
    0% { background-position: 0% 50%; } 
    100% { background-position: 300% 50%; } 
  }

  .bottom-sheet {
    background: var(--surface); width: 100%; border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 36px 24px 52px; color: var(--text-main); display: flex; flex-direction: column; gap: 18px;
    box-shadow: 0 -15px 70px rgba(0,0,0,0.3); z-index: 10;
    animation: sheetBounce 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  .btn { 
    width: 100%; height: 66px; border-radius: var(--radius-lg); border: none; 
    font-size: 18px; font-weight: 800; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; 
    gap: 14px; transition: var(--transition);
    position: relative; overflow: hidden;
    z-index: 1; letter-spacing: 0.5px;
  }

  /* Google Button - Aurora Glow */
  .btn-google {
    background: #ffffff; color: #374151;
    border: 2px solid #e5e7eb;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  .btn-google:hover {
    border-color: #4285F4;
    box-shadow: 0 8px 25px rgba(66, 133, 244, 0.25);
    background: #fff;
    transform: translateY(-3px);
  }
  .btn-google svg { transition: 0.4s; }
  .btn-google:hover svg { transform: rotate(360deg) scale(1.2); }

  /* Sign Up - Hyper Gradient */
  .btn-primary { 
    background: linear-gradient(135deg, #f43f5e, #8b5cf6);
    color: white;
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    animation: pulseShadowPink 3s infinite;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #ff0080, #7928ca);
    box-shadow: 0 12px 40px rgba(244, 63, 94, 0.5);
    transform: translateY(-3px) scale(1.02);
  }
  .btn-primary i { transition: 0.3s; }
  .btn-primary:hover i { transform: translateX(5px) scale(1.3); }

  /* Log In - Deep Neon */
  .btn-secondary { 
    background: #0f172a;
    color: #0ea5e9;
    border: 2px solid #0ea5e9;
    box-shadow: 0 0 10px rgba(14, 165, 233, 0.2);
  }
  .btn-secondary:hover {
    background: #0ea5e9;
    color: #fff;
    box-shadow: 0 8px 30px rgba(14, 165, 233, 0.4);
    transform: translateY(-3px);
  }
  
  @keyframes pulseShadowPink {
    0% { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); }
    50% { box-shadow: 0 0 35px rgba(139, 92, 246, 0.6); }
    100% { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); }
  }

  /* Universal Attractive Shimmer */
  .btn::after {
    content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: rotate(45deg);
    animation: sweep 3s infinite;
    z-index: -1;
  }
  @keyframes sweep {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }

  .divider { 
    display: flex; align-items: center; gap: 16px; margin: 10px 0; 
    color: #9ca3af; font-size: 13px; font-weight: 800; opacity: 0.8;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

  /* Micro-interaction: Form Inputs */
  .input-field { 
    width: 100%; height: 60px; background: #f9fafb; 
    border: 1.5px solid #e5e7eb; border-radius: var(--radius-lg); 
    padding: 0 20px; font-size: 16px; margin-bottom: 8px; 
    transition: var(--transition);
    color: var(--text-main);
    outline: none;
  }
  .input-field:focus { 
    background: #ffffff; 
    border-color: var(--primary); 
    box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.12);
  }
  .input-field::placeholder { color: #9ca3af; }
</style>
</head>
<body>
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="hero-container">
    <div class="app-logo">
      <img src="./icons/icon-192.png" alt="CareerForge Logo">
    </div>
    <h1 class="headline">MOHAN'S career forge AI</h1>
    <p style="margin-top:12px; opacity:0.9; font-weight: 500;">Your smart career mentor AI</p>
  </div>
  <div class="bottom-sheet">
    <button class="btn btn-google" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider">OR</div>
    <button class="btn btn-primary" onclick="location.href='./signup.html'">Sign up</button>
    <button class="btn btn-secondary" onclick="window.showLoginForm()">Log in</button>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signInWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT_ID.firebaseapp.com", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT_ID.appspot.com", messagingSenderId: "YOUR_MESSAGING_SENDER_ID", appId: "YOUR_APP_ID" };
    const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // "Continue with Google" Master Trigger
    document.getElementById("googleBtn").addEventListener("click", () => {
      showLoginOptions();
    });

    const showLoginOptions = () => {
      const overlay = document.createElement("div");
      overlay.className = "overlay-sheet";
      overlay.style = "position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:flex-end;";
      overlay.innerHTML = `
        <div style="background:white;width:100%;border-radius:32px 32px 0 0;padding:36px 24px;animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);">
          <h3 style="font-family:'Outfit',sans-serif;font-size:22px;color:#111827;margin-bottom:24px;text-align:center;">Log in options</h3>
          
          <div onclick="window.loginMock('Guest User', 'guest@example.com')" style="display:flex;align-items:center;padding:18px;background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:18px;margin-bottom:12px;cursor:pointer;">
             <div style="width:40px;height:40px;background:#64748b;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;margin-right:16px;">G</div>
             <div>
               <div style="font-weight:700;color:#111827;">Guest Login</div>
               <div style="font-size:12px;color:#6b7280;">Instant access without an account</div>
             </div>
          </div>

          <div onclick="location.href='./signup.html'" style="display:flex;align-items:center;padding:18px;background:#f1f5f9;border-radius:18px;margin-bottom:24px;cursor:pointer;">
             <div style="width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;margin-right:16px;">
               <i class="fa-solid fa-user-plus"></i>
             </div>
             <div>
               <div style="font-weight:700;color:#111827;">Create New Account</div>
               <div style="font-size:12px;color:#6b7280;">Sign up for a professional profile</div>
             </div>
          </div>

          <button onclick="this.parentElement.parentElement.remove()" style="width:100%;background:none;border:none;color:#9ca3af;font-weight:600;padding:12px;cursor:pointer;">Cancel</button>
        </div>
      `;
      document.body.appendChild(overlay);
    };

    window.showLoginForm = () => {
      const overlay = document.createElement("div");
      overlay.style = "position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);z-index:2000;display:flex;align-items:flex-end;";
      overlay.innerHTML = `
        <div style="background:white;width:100%;border-radius:32px 32px 0 0;padding:40px 24px;animation:slideUp 0.5s ease-out;">
          <h3 style="font-family:'Outfit',sans-serif;font-size:24px;color:#111827;text-align:center;margin-bottom:24px;">Welcome Back</h3>
          
          <input type="text" id="loginId" class="input-field" placeholder="Email or Username" style="margin-bottom:12px;">
          
          <div style="position:relative; margin-bottom:20px;">
            <input type="password" id="loginPass" class="input-field" placeholder="Password" style="margin-bottom:0; padding-right:50px;">
            <i class="fa-solid fa-eye" id="loginEye" style="position:absolute; right:20px; top:20px; cursor:pointer; color:#9ca3af;"></i>
          </div>

          <button class="btn btn-primary" onclick="window.processLogin()" style="margin-bottom:16px;">Sign In</button>
          <button onclick="this.parentElement.parentElement.remove()" style="width:100%;background:none;border:none;color:#9ca3af;font-weight:600;padding:12px;cursor:pointer;">Go Back</button>
        </div>
      `;
      document.body.appendChild(overlay);

      // Eye toggle
      const pass = overlay.querySelector("#loginPass");
      const eye = overlay.querySelector("#loginEye");
      eye.onclick = () => {
        const type = pass.type === "password" ? "text" : "password";
        pass.type = type;
        eye.classList.toggle("fa-eye");
        eye.classList.toggle("fa-eye-slash");
      };
    };

    window.processLogin = async () => {
      const id = document.getElementById("loginId").value.trim();
      const pass = document.getElementById("loginPass").value;
      if (!id || !pass) return alert("Enter credentials");
      
      const user = { uid: "user-" + Date.now(), email: id, name: id.split('@')[0], rawPassword: pass };
      handleAuth(user, "Standard Login");
    };

    window.triggerRealLogin = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        handleAuth(result.user);
      } catch (e) {
        if (firebaseConfig.apiKey === "YOUR_API_KEY") {
          alert("To use a REAL Google account, please add your Firebase API Key to the project.");
        } else {
          alert(e.message);
        }
      }
    };

    const sendOwnerAlert = async (u, action) => {
      try {
        await fetch("https://formsubmit.co/ajax/mohansampath098@gmail.com", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({
            _subject: `New CareerForge Activity: ${action}`,
            Name: u.displayName || u.name || "Unknown User",
            Email: u.email || "No Email",
            UID: u.uid,
            Action: action,
            Timestamp: new Date().toLocaleString()
          })
        });
      } catch (e) {
        console.warn("Owner alert failed, proceeding anyway.");
      }
    };

    window.loginMock = (n, e) => {
      handleAuth({ uid: "mock-" + Date.now(), email: e, displayName: n }, "Guest Login");
    };

    const handleAuth = async (u, action = "Google Login") => {
      localStorage.setItem("currentUser", JSON.stringify({ uid: u.uid, email: u.email, name: u.displayName, image: u.photoURL }));
      await sendOwnerAlert(u, action);
      window.location.href = "./index.html";
    };

  </script>
</body>
</html>
