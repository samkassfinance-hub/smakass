<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Account — CareerForge AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="./style.css">
<style>
  :root {
    --primary: #f43f5e; --secondary: #8b5cf6;
    --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b;
    --radius-xl: 32px; --radius-lg: 16px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', sans-serif; background: #0f172a;
    height: 100dvh; overflow: hidden; display: flex; flex-direction: column; color: white;
    position: relative;
  }

  /* Animated Color Blobs */
  .bg-blob {
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    filter: blur(90px); opacity: 0.45; z-index: -1;
    animation: blobMove 25s infinite alternate;
  }
  .blob1 { background: #f43f5e; top: -10%; left: -10%; }
  .blob2 { background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -5s; }
  .blob3 { background: #0ea5e9; top: 40%; left: 30%; animation-delay: -10s; }

  @keyframes blobMove {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(120px, 180px) scale(1.3); }
    66% { transform: translate(-120px, 100px) scale(0.9); }
    100% { transform: translate(0, 0) scale(1); }
  }

  .back-btn { 
    position: absolute; top: 20px; left: 20px; z-index: 100;
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); color: white; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.2); text-decoration: none; transition: var(--transition);
  }
  .back-btn:hover { background: white; color: var(--primary); transform: translateX(-4px); }

  .hero-area { 
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
    padding: 10px 24px; text-align: center;
    animation: floating 6s ease-in-out infinite;
  }
  @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

  .profile-avatar-master {
     width: 100px; height: 100px; position: relative; margin-bottom: 24px;
     animation: colorGlow 8s infinite alternate; border-radius: 50%; padding: 4px; border: 3px solid rgba(255,255,255,0.3);
  }
  .profile-avatar-master img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  @keyframes colorGlow {
    0% { box-shadow: 0 0 25px rgba(244, 63, 94, 0.4); border-color: #f43f5e; }
    50% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.4); border-color: #8b5cf6; }
    100% { box-shadow: 0 0 25px rgba(14, 165, 233, 0.4); border-color: #0ea5e9; }
  }
  
  .cam-btn {
    position: absolute; bottom: 4px; right: 4px; width: 30px; height: 30px; 
    background: #111827; color: white; border-radius: 50%; display: flex; 
    align-items: center; justify-content: center; font-size: 14px; cursor: pointer;
    border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .headline-pill {
    font-family: 'Outfit', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -1.5px;
    background: linear-gradient(90deg, #f43f5e, #8b5cf6, #0ea5e9, #f43f5e);
    background-size: 300% auto; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: textGradient 6s linear infinite;
  }
  @keyframes textGradient { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

  .bottom-sheet {
    background: var(--surface); width: 100%; border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: 32px 24px 44px; color: var(--text-main); display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 -15px 70px rgba(0,0,0,0.4); z-index: 10;
    max-height: 75vh; overflow-y: auto;
    animation: sheetBounce 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes sheetBounce { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .input-field { 
    width: 100%; height: 58px; background: #f8fafc; border: 1.5px solid #e2e8f0; 
    border-radius: var(--radius-lg); padding: 0 20px; font-size: 16px; transition: var(--transition); outline: none;
    color: #1e293b;
  }
  .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1); }

  .btn-premium {
    width: 100%; height: 60px; border-radius: var(--radius-lg); border: none; font-size: 17px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: 0.3s;
    position: relative; overflow: hidden;
  }
  .btn-save { background: linear-gradient(135deg, #f43f5e, #8b5cf6); color: white; box-shadow: 0 10px 25px rgba(244, 63, 94, 0.3); }
  .btn-save:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(244, 63, 94, 0.4); }

  .btn-logout { background: #0f172a; color: #f43f5e; border: 1.5px solid #f43f5e; }
  .btn-logout:hover { background: #fee2e2; transform: translateY(-3px); }

  .input-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 4px; }
  
  /* Shimmer */
  .btn-premium::after {
    content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(45deg); animation: sweep 4s infinite;
  }
  @keyframes sweep { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }

  .section-title { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; color: #1e293b; margin-top: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; }

</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<a href="javascript:void(0)" onclick="handleBack()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>

<script src="./install-app.js"></script>
<script>
  function handleBack() {
    // If PWA is installable and not already in standalone mode
    if (window.CareerForgePWA && window.CareerForgePWA.isInstallable() && !window.CareerForgePWA.isStandalone()) {
      window.CareerForgePWA.triggerPrompt();
      // We navigate after a small delay or let the user choice handle it, 
      // but usually navigation should happen after the prompt logic.
      // However, to keep it simple and fulfill the "notification comes" part:
      setTimeout(() => window.location.href = "./index.html", 1000);
    } else {
      window.location.href = "./index.html";
    }
  }
</script>

<div class="hero-area">
  <div class="profile-avatar-master">
    <img id="profileImg" src="https://via.placeholder.com/150/f0fdf4/00c853?text=E" alt="Profile">
    <label for="imageUpload" class="cam-btn"><i class="fa-solid fa-camera"></i></label>
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
  </div>
  <h1 class="headline-pill">My Profile</h1>
  <p style="opacity:0.8; font-weight: 500; font-size: 14px;">Manage your settings & password</p>
</div>

<div class="bottom-sheet">
  <div id="profileLoading" style="text-align: center; color: var(--primary); padding: 20px;">
    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
  </div>

  <div>
    <label class="input-label">Full Name</label>
    <input type="text" id="name" class="input-field" placeholder="Full Name">
  </div>
  <div>
    <label class="input-label">Username</label>
    <input type="text" id="username" class="input-field" placeholder="Username">
  </div>
  <div>
    <label class="input-label">Email (Read Only)</label>
    <input type="email" id="email" class="input-field" disabled style="opacity: 0.6;">
  </div>
  <div>
    <label class="input-label">Phone Number</label>
    <input type="tel" id="phone" class="input-field" placeholder="Phone Number">
  </div>
  <div class="section-title">Security</div>
  <div style="position:relative;">
    <label class="input-label">Old Password</label>
    <input type="password" id="oldPassword" class="input-field" placeholder="Enter current password" style="padding-right: 50px;">
    <i class="fa-solid fa-eye" id="toggleOldPass" style="position:absolute; right:20px; bottom:20px; cursor:pointer; color:#9ca3af;"></i>
  </div>
  <div style="position:relative;">
    <label class="input-label">New Password</label>
    <input type="password" id="newPassword" class="input-field" placeholder="Enter new password" style="padding-right: 50px;">
    <i class="fa-solid fa-eye" id="toggleNewPass" style="position:absolute; right:20px; bottom:20px; cursor:pointer; color:#9ca3af;"></i>
  </div>
  <div style="position:relative;">
    <label class="input-label">Confirm New Password</label>
    <input type="password" id="confirmNewPassword" class="input-field" placeholder="Confirm new password" style="padding-right: 50px;">
    <i class="fa-solid fa-eye" id="toggleConfirmNewPass" style="position:absolute; right:20px; bottom:20px; cursor:pointer; color:#9ca3af;"></i>
  </div>

  <div style="margin-top: 20px; padding-bottom: 80px;">
    <!-- Combined Master Button -->
    <button id="masterUpdateBtn" class="btn-premium" style="background: linear-gradient(135deg, #f43f5e, #8b5cf6, #0ea5e9); color: white; position: sticky; bottom: -20px; z-index: 100; box-shadow: 0 -8px 30px rgba(0,0,0,0.15); font-size: 18px;">
      <i class="fa-solid fa-cloud-arrow-up"></i> Save All Changes
    </button>
  </div>

  <div class="section-title" style="margin-top: 30px;">Actions</div>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
    <button id="logoutBtn" class="btn-premium btn-logout" style="height: 54px; font-size:15px;"><i class="fa-solid fa-sign-out"></i> Logout</button>
    <button id="deleteAccountBtn" class="btn-premium" style="height:54px; font-size:15px; background:#fff1f2; color:#e11d48; border:1.5px solid #fda4af;"><i class="fa-solid fa-trash-alt"></i> Delete Account</button>
  </div>
</div>

<!-- Custom Toast Notification -->
<div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:#111827; color:white; padding:16px 28px; border-radius:20px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:9999; transition:0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); display:flex; align-items:center; gap:12px; border:1.5px solid var(--primary);">
  <i class="fa-solid fa-circle-check" style="color:var(--primary);"></i>
  <span id="toastMsg">Changes Saved!</span>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, updatePassword, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const showToast = (msg, icon = "fa-circle-check") => {
    const t = document.getElementById("toast");
    const m = document.getElementById("toastMsg");
    m.innerText = msg;
    t.querySelector('i').className = `fa-solid ${icon}`;
    t.style.transform = "translateX(-50%) translateY(0)";
    setTimeout(() => { t.style.transform = "translateX(-50%) translateY(100px)"; }, 3000);
  };

  const setupToggle = (id, toggleId) => {
    const input = document.getElementById(id);
    const icon = document.getElementById(toggleId);
    if(!icon) return;
    icon.addEventListener("click", () => {
      const type = input.type === "password" ? "text" : "password";
      input.type = type;
      icon.classList.toggle("fa-eye-slash");
      icon.classList.toggle("fa-eye");
    });
  };
  setupToggle("oldPassword", "toggleOldPass");
  setupToggle("newPassword", "toggleNewPass");
  setupToggle("confirmNewPassword", "toggleConfirmNewPass");

  document.getElementById("phone").addEventListener("input", function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
  });

  window.googleTranslateElementInit = function() {
    new google.translate.TranslateElement({ pageLanguage: 'en', autoDisplay: false }, 'google_translate_element');
  };
  window.translateLanguage = function(val) {
    var teCombo = document.querySelector('.goog-te-combo');
    if (teCombo) {
      teCombo.value = val;
      teCombo.dispatchEvent(new Event('change', { bubbles: true }));
    }
    document.cookie = "googtrans=/en/" + val + "; path=/";
  };

  var googleScript = document.createElement('script');
  googleScript.type = 'text/javascript';
  googleScript.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
  document.head.appendChild(googleScript);

  const firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_PROJECT_ID.firebaseapp.com", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_PROJECT_ID.appspot.com", messagingSenderId: "YOUR_MESSAGING_SENDER_ID", appId: "YOUR_APP_ID" };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    const localUser = JSON.parse(localStorage.getItem("currentUser") || "null");
    if (!user && !localUser) { window.location.href = "./login.html"; return; }
    const data = {
      name: localUser?.name || user?.displayName || "",
      username: localUser?.username || localUser?.name?.toLowerCase().replace(/\s/g, '') || "",
      email: localUser?.email || user?.email || "",
      phone: localUser?.phone || "",
      image: localUser?.image || user?.photoURL || "https://via.placeholder.com/150/f0fdf4/00c853?text=E"
    };
    document.getElementById("name").value = data.name;
    document.getElementById("username").value = data.username;
    document.getElementById("email").value = data.email;
    document.getElementById("phone").value = data.phone;
    document.getElementById("profileImg").src = data.image;
    document.querySelector('.headline-pill').innerText = `Hi, ${data.name.split(' ')[0]}`;
    const loader = document.getElementById("profileLoading");
    if(loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 300);
    }
  });

  document.getElementById("imageUpload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function() {
        const base64 = reader.result;
        document.getElementById("profileImg").src = base64;
        const localUser = JSON.parse(localStorage.getItem("currentUser"));
        if(localUser) {
          localUser.image = base64;
          localStorage.setItem("currentUser", JSON.stringify(localUser));
        }
        showToast("Photo updated!");
      };
      reader.readAsDataURL(file);
    }
  });

  // MASTER UNIFIED UPDATE LOGIC
  document.getElementById("masterUpdateBtn").addEventListener("click", async function() {
    const btn = this;
    const localUser = JSON.parse(localStorage.getItem("currentUser"));
    if (!localUser) return;
    
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`;
    
    // 1. Handle Details Update
    localUser.name = document.getElementById("name").value.trim();
    localUser.username = document.getElementById("username").value.trim();
    localUser.phone = document.getElementById("phone").value.trim();

    // 2. Handle Password Update (if fields filled)
    let oldPwd = document.getElementById("oldPassword").value;
    let newPwd = document.getElementById("newPassword").value;
    let confirmPwd = document.getElementById("confirmNewPassword").value;
    let passwordUpdated = false;

    if (oldPwd || newPwd || confirmPwd) {
      // 1. Check if old password is correct
      if (oldPwd !== localUser.rawPassword) {
        showToast("Incorrect Old Password!", "fa-circle-xmark");
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save All Changes`;
        return;
      }
      // 2. Check new password length
      if (newPwd.length < 6) { 
        showToast("Pass min 6 chars!", "fa-triangle-exclamation"); 
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save All Changes`;
        return; 
      }
      // 3. Check if new passwords match
      if (newPwd !== confirmPwd) { 
        showToast("Match error!", "fa-triangle-exclamation"); 
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save All Changes`;
        return; 
      }
      localUser.rawPassword = newPwd;
      passwordUpdated = true;
    }

    localStorage.setItem("currentUser", JSON.stringify(localUser));

    // Firebase Sync
    try {
      if (auth.currentUser && firebaseConfig.apiKey !== "YOUR_API_KEY") {
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
          name: localUser.name,
          username: localUser.username,
          phone: localUser.phone
        });
        if(passwordUpdated) await updatePassword(auth.currentUser, newPwd);
      }
      
      showToast(passwordUpdated ? "Profile & Password Updated!" : "Profile Updated!");
      if(passwordUpdated) {
        document.getElementById("oldPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmNewPassword").value = "";
      }
    } catch (e) {
      showToast("Updated locally!", "fa-circle-exclamation");
    }
    
    btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save All Changes`;
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    localStorage.removeItem("currentUser");
    try { await signOut(auth); } catch(e){}
    window.location.href = "./login.html";
  });

  document.getElementById("deleteAccountBtn").addEventListener("click", async () => {
    if (confirm("⚠️ Permanent Delete? All data will be lost.")) {
      try {
        const user = auth.currentUser;
        if (user && firebaseConfig.apiKey !== "YOUR_API_KEY") {
          await deleteDoc(doc(db, "users", user.uid)); await deleteUser(user);
        }
      } catch(e) {}
      localStorage.clear();
      window.location.href = "./signup.html";
    }
  });
</script>
</body>
</html>
