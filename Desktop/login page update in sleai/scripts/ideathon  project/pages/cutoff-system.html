<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cutoff System - College Admission</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .cutoff-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background-color: #764ba2;
        }
        .btn-secondary {
            background-color: #ddd;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #ccc;
        }
        .result-box {
            background-color: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 5px;
            margin-top: 30px;
            display: none;
        }
        .result-box.show {
            display: block;
        }
        .result-box h3 {
            margin-top: 0;
            color: #667eea;
        }
        .cutoff-score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
        .error.show {
            display: block;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .back-btn:hover {
            background-color: #764ba2;
        }
        .degree-info {
            background-color: #f0f4ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="cutoff-container">
        <a href="admission-type.html" class="back-btn">← Back</a>
        <h1>Cutoff / Counselling System</h1>
        <div class="degree-info">
            Degree: <span id="degreeDisplay"></span>
        </div>

        <div id="error" class="error"></div>

        <form id="cutoffForm">
            <div id="subjectsContainer"></div>
            
            <div class="button-group">
                <button type="submit" class="btn btn-primary">Calculate Cutoff</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>

        <div id="resultBox" class="result-box">
            <h3>Your Cutoff Score</h3>
            <div class="cutoff-score" id="cutoffScore">-</div>
            <button class="btn btn-primary" onclick="generateColleges()" style="width: 100%; margin-top: 15px;">
                Generate Colleges
            </button>
        </div>
    </div>

    <script src="../scripts/college-system.js"></script>
    <script>
        let dbData = null;
        let calculatedCutoff = null;

        async function initPage() {
            try {
                dbData = await window.collegeSystem.loadDatabase();
                const degree = sessionStorage.getItem('selectedDegree');
                
                if (!degree) {
                    window.location.href = 'select-degree.html';
                    return;
                }

                document.getElementById('degreeDisplay').textContent = degree;
                loadSubjects(degree);
            } catch (error) {
                showError('Error loading page data');
                console.error(error);
            }
        }

        function loadSubjects(degree) {
            const subjects = dbData.subjects[degree] || [];
            const container = document.getElementById('subjectsContainer');
            
            if (!subjects || subjects.length === 0) {
                container.innerHTML = '<div class="error show">No subjects configured for this degree. Please add subjects to database.json</div>';
                return;
            }

            container.innerHTML = subjects.map(subject => `
                <div class="form-group">
                    <label for="${subject}">${subject} Marks</label>
                    <input type="number" id="${subject}" name="${subject}" min="0" max="100" placeholder="Enter marks" required>
                </div>
            `).join('');
        }

        document.getElementById('cutoffForm').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateCutoff();
        });

        function calculateCutoff() {
            try {
                const degree = sessionStorage.getItem('selectedDegree');
                const formula = dbData.cutoff_formula[degree];
                
                if (!formula) {
                    showError('Cutoff formula not configured for this degree');
                    return;
                }

                const marks = {};
                const subjects = dbData.subjects[degree] || [];
                
                subjects.forEach(subject => {
                    const value = parseFloat(document.getElementById(subject).value);
                    if (isNaN(value)) {
                        throw new Error(`Invalid marks for ${subject}`);
                    }
                    marks[subject] = value;
                });

                // Evaluate formula
                calculatedCutoff = eval(formula);
                
                document.getElementById('cutoffScore').textContent = calculatedCutoff.toFixed(2);
                document.getElementById('resultBox').classList.add('show');
                document.getElementById('error').classList.remove('show');
            } catch (error) {
                showError('Error calculating cutoff: ' + error.message);
            }
        }

        function generateColleges() {
            if (calculatedCutoff === null) {
                showError('Please calculate cutoff first');
                return;
            }
            
            const degree = sessionStorage.getItem('selectedDegree');
            sessionStorage.setItem('cutoffScore', calculatedCutoff);
            sessionStorage.setItem('admissionType', 'cutoff');
            window.location.href = 'colleges-result.html';
        }

        function showError(message) {
            const errorBox = document.getElementById('error');
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        initPage();
    </script>
</body>
</html>
