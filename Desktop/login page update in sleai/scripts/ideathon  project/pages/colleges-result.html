<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Results - College Admission System</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .results-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .filters {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .filter-group input,
        .filter-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }
        .colleges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .college-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        .college-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-3px);
        }
        .college-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .college-info {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .college-info-item {
            margin-bottom: 8px;
        }
        .college-info-label {
            font-weight: 500;
            color: #333;
        }
        .college-info-value {
            color: #667eea;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 0.95em;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 100%;
        }
        .btn-primary {
            background-color: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background-color: #764ba2;
        }
        .btn-secondary {
            background-color: #ddd;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #ccc;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .no-results h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #666;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .back-btn:hover {
            background-color: #764ba2;
        }
        .results-header {
            background-color: #f0f4ff;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .results-header h2 {
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .results-count {
            color: #666;
            font-size: 0.95em;
        }
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="results-container">
        <a href="admission-type.html" class="back-btn">← Back</a>
        
        <div class="results-header">
            <h2>College Results</h2>
            <div class="results-count">
                Degree: <strong id="degreeDisplay"></strong> | 
                Type: <strong id="typeDisplay"></strong>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search college name..." onkeyup="filterColleges()">
                <select id="locationFilter" onchange="filterColleges()">
                    <option value="">All Locations</option>
                </select>
            </div>
        </div>

        <div id="collegesContainer" class="colleges-grid">
            <div class="loading">Loading colleges...</div>
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            <h2>No Colleges Found</h2>
            <p>Try adjusting your filters or search criteria.</p>
            <a href="admission-type.html" class="btn btn-secondary" style="display: inline-block; width: auto; margin-top: 15px;">
                Try Different Criteria
            </a>
        </div>
    </div>

    <script src="../scripts/college-system.js"></script>
    <script>
        let dbData = null;
        let allColleges = [];
        let filteredColleges = [];

        async function initPage() {
            try {
                dbData = await window.collegeSystem.loadDatabase();
                const degree = sessionStorage.getItem('selectedDegree');
                const admissionType = sessionStorage.getItem('admissionType');
                
                if (!degree || !admissionType) {
                    window.location.href = 'select-degree.html';
                    return;
                }

                document.getElementById('degreeDisplay').textContent = degree;
                document.getElementById('typeDisplay').textContent = 
                    admissionType.charAt(0).toUpperCase() + admissionType.slice(1);

                loadColleges(degree, admissionType);
            } catch (error) {
                console.error('Error loading page:', error);
                document.getElementById('collegesContainer').innerHTML = 
                    '<div class="error">Error loading colleges. Make sure data/database.json is valid JSON.</div>';
            }
        }

        function loadColleges(degree, admissionType) {
            let colleges = [];

            if (admissionType === 'cutoff') {
                colleges = dbData.colleges.cutoff || [];
            } else if (admissionType === 'exam') {
                colleges = dbData.colleges.exam || [];
            } else if (admissionType === 'management') {
                colleges = dbData.colleges.management || [];
            }

            // Filter by degree
            allColleges = colleges.filter(c => c.degree === degree);
            filteredColleges = [...allColleges];

            populateLocationFilter();
            displayColleges();
        }

        function populateLocationFilter() {
            const locations = [...new Set(allColleges.map(c => c.location))].filter(Boolean);
            const select = document.getElementById('locationFilter');
            
            locations.forEach(location => {
                const option = document.createElement('option');
                option.value = location;
                option.textContent = location;
                select.appendChild(option);
            });
        }

        function filterColleges() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const location = document.getElementById('locationFilter').value;

            filteredColleges = allColleges.filter(college => {
                const matchesSearch = college.college_name.toLowerCase().includes(searchTerm);
                const matchesLocation = !location || college.location === location;
                return matchesSearch && matchesLocation;
            });

            displayColleges();
        }

        function displayColleges() {
            const container = document.getElementById('collegesContainer');
            const noResults = document.getElementById('noResults');

            if (filteredColleges.length === 0) {
                container.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            noResults.style.display = 'none';
            container.innerHTML = filteredColleges.map(college => createCollegeCard(college)).join('');
        }

        function createCollegeCard(college) {
            let feeInfo = '';
            
            if (college.fee_range) {
                feeInfo = `<div class="college-info-item">
                    <span class="college-info-label">Fee Range:</span>
                    <span class="college-info-value">₹${college.fee_range}</span>
                </div>`;
            }
            if (college.cutoff_range) {
                feeInfo = `<div class="college-info-item">
                    <span class="college-info-label">Cutoff Range:</span>
                    <span class="college-info-value">${college.cutoff_range}</span>
                </div>`;
            }
            if (college.score_range) {
                feeInfo = `<div class="college-info-item">
                    <span class="college-info-label">Score Range:</span>
                    <span class="college-info-value">${college.score_range}</span>
                </div>`;
            }

            return `
                <div class="college-card">
                    <div class="college-name">${college.college_name}</div>
                    <div class="college-info">
                        <div class="college-info-item">
                            <span class="college-info-label">Location:</span>
                            <span class="college-info-value">${college.location}</span>
                        </div>
                        ${feeInfo}
                    </div>
                    <button class="btn btn-primary" onclick="viewDetails('${college.college_name}')">
                        View Details
                    </button>
                </div>
            `;
        }

        function viewDetails(collegeName) {
            sessionStorage.setItem('selectedCollege', collegeName);
            window.location.href = 'college-details.html';
        }

        initPage();
    </script>
</body>
</html>
