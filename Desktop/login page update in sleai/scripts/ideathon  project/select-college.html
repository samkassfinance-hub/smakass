<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select College - Tamil Nadu Admission</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
            animation: slideUp 0.6s ease-out;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.05em;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .cutoff-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-top: 10px;
            display: none;
        }

        .cutoff-info.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results-section {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .results-section.show {
            display: block;
        }

        .results-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .results-header h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }

        .info-item strong {
            color: #333;
        }

        .colleges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .college-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        .college-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .college-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }

        .college-name {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .college-city {
            font-size: 0.9em;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .college-body {
            padding: 20px;
        }

        .college-info {
            margin-bottom: 15px;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 1em;
        }

        .tier-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .tier-top {
            background: #fff3cd;
            color: #856404;
        }

        .tier-high {
            background: #d1ecf1;
            color: #0c5460;
        }

        .tier-good {
            background: #d4edda;
            color: #155724;
        }

        .tier-medium {
            background: #f8d7da;
            color: #721c24;
        }

        .specialization {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .spec-tag {
            background: #f0f0f0;
            color: #333;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        .placement-rate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .college-footer {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-details {
            background: #667eea;
            color: white;
        }

        .btn-details:hover {
            background: #764ba2;
        }

        .btn-website {
            background: #f0f0f0;
            color: #333;
        }

        .btn-website:hover {
            background: #e0e0e0;
        }

        .no-results {
            background: white;
            border-radius: 15px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .no-results i {
            font-size: 4em;
            color: #ccc;
            margin-bottom: 20px;
        }

        .no-results h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .no-results p {
            color: #666;
            margin-bottom: 20px;
        }

        .filter-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .filter-section.show {
            display: block;
        }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .input-wrapper {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .colleges-grid {
                grid-template-columns: 1fr;
            }

            .results-info {
                flex-direction: column;
            }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="./index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> Select Your College</h1>
            <p>Find the perfect college based on your TNEA cutoff score</p>
        </div>

        <div class="search-section">
            <form id="searchForm">
                <div class="form-group">
                    <label for="degree">
                        <i class="fas fa-book"></i> Select Your Degree
                    </label>
                    <select id="degree" required>
                        <option value="">-- Choose a Degree --</option>
                    </select>
                </div>

                <div class="input-wrapper">
                    <div class="form-group">
                        <label for="cutoff">
                            <i class="fas fa-chart-line"></i> Enter Your Cutoff Score
                        </label>
                        <input type="number" id="cutoff" min="0" max="200" placeholder="0-200" required>
                        <div class="cutoff-info" id="cutoffInfo"></div>
                    </div>

                    <div class="form-group">
                        <label for="collegeType">
                            <i class="fas fa-filter"></i> Filter by Type (Optional)
                        </label>
                        <select id="collegeType">
                            <option value="">All Types</option>
                            <option value="Government">Government</option>
                            <option value="Private">Private</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-search"></i> Search Colleges
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fas fa-redo"></i> Clear
                    </button>
                </div>
            </form>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2><i class="fas fa-list"></i> Matching Colleges</h2>
                <div class="results-info">
                    <div class="info-item">
                        <strong>Degree:</strong> <span id="selectedDegree"></span>
                    </div>
                    <div class="info-item">
                        <strong>Your Cutoff:</strong> <span id="selectedCutoff"></span>
                    </div>
                    <div class="info-item">
                        <strong>Colleges Found:</strong> <span id="collegeCount">0</span>
                    </div>
                </div>
            </div>

            <div class="filter-section" id="filterSection">
                <div class="filter-group">
                    <select id="tierFilter" onchange="applyFilters()">
                        <option value="">All Tiers</option>
                        <option value="Top">Top Tier</option>
                        <option value="High">High Tier</option>
                        <option value="Good">Good Tier</option>
                        <option value="Medium">Medium Tier</option>
                    </select>
                    <select id="cityFilter" onchange="applyFilters()">
                        <option value="">All Cities</option>
                    </select>
                </div>
            </div>

            <div class="colleges-grid" id="collegesGrid"></div>

            <div class="no-results" id="noResults" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>No Colleges Found</h3>
                <p>Try adjusting your cutoff score or filters</p>
            </div>
        </div>
    </div>

    <script src="./js/college-selector.js"></script>
</body>
</html>
