<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partial Payment - SamKass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 24px; margin-bottom: 10px; color: #333; }
    .client-name { font-size: 18px; color: #666; margin-bottom: 20px; }
    .emi-info {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .emi-label { font-size: 14px; color: #666; }
    .emi-amount { font-size: 28px; font-weight: bold; color: #7ed321; }
    label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 18px;
      margin-bottom: 20px;
      transition: border 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #7ed321;
    }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #7ed321;
      color: white;
      margin-bottom: 10px;
    }
    .btn-primary:hover {
      background: #6bc215;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(126, 211, 33, 0.4);
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .status {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; display: block; }
    .error { background: #f8d7da; color: #721c24; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>💰 Partial Payment</h1>
    <div class="client-name" id="clientName">Loading...</div>
    
    <div class="emi-info">
      <div class="emi-label">EMI Amount</div>
      <div class="emi-amount" id="emiAmount">₹0</div>
    </div>
    
    <div id="status" class="status"></div>
    
    <label for="amount">Enter Partial Amount Received</label>
    <input type="number" id="amount" placeholder="Enter amount" min="1" step="0.01" autofocus>
    
    <button class="btn-primary" onclick="savePartial()">✅ Confirm Payment</button>
    <button class="btn-secondary" onclick="window.close()">Cancel</button>
  </div>

  <script>
    // Get params from URL
    const params = new URLSearchParams(window.location.search);
    const loanId = params.get('loan_id');
    const emiAmount = parseFloat(params.get('amount')) || 0;
    const clientName = decodeURIComponent(params.get('name') || 'Client');
    
    // Display info
    document.getElementById('clientName').textContent = clientName;
    document.getElementById('emiAmount').textContent = `₹${emiAmount.toFixed(2)}`;
    document.getElementById('amount').max = emiAmount;
    
    async function savePartial() {
      const amount = parseFloat(document.getElementById('amount').value);
      
      if (!amount || amount <= 0) {
        showStatus('Please enter a valid amount', 'error');
        return;
      }
      
      if (amount > emiAmount) {
        showStatus(`Amount cannot exceed ₹${emiAmount.toFixed(2)}`, 'error');
        return;
      }
      
      try {
        // Call backend API
        const response = await fetch('https://samkass.site/api/cron/notify-action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            loans: [{
              loan_id: loanId,
              client_name: clientName,
              amount: emiAmount
            }],
            action: 'partly_paid',
            amount: amount
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          showStatus(`✅ Partial payment of ₹${amount.toFixed(2)} recorded!`, 'success');
          
          // Close after 2 seconds
          setTimeout(() => {
            window.close();
            // If close fails, redirect to app
            setTimeout(() => window.location.href = '/', 100);
          }, 2000);
        } else {
          showStatus('Failed to save payment. Please try again.', 'error');
        }
        
      } catch (error) {
        console.error('Error:', error);
        showStatus('Network error. Please check your connection.', 'error');
      }
    }
    
    function showStatus(msg, type) {
      const status = document.getElementById('status');
      status.textContent = msg;
      status.className = 'status ' + type;
    }
    
    // Handle Enter key
    document.getElementById('amount').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') savePartial();
    });
  </script>
</body>
</html>
