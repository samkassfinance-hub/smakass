<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partial Payment - SamKass</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1410 0%, #0d1a0d 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(13, 26, 13, 0.95);
      border: 2px solid rgba(126, 211, 33, 0.3);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #7ed321, #4caf1a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(126, 211, 33, 0.4);
    }

    .logo svg {
      width: 50px;
      height: 50px;
      fill: white;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #7ed321;
    }

    .client-info {
      text-align: center;
      margin-bottom: 24px;
      padding: 16px;
      background: rgba(126, 211, 33, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(126, 211, 33, 0.3);
    }

    .client-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .due-amount {
      font-size: 0.9rem;
      color: #b0c4b0;
    }

    .due-amount strong {
      color: #7ed321;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #b0c4b0;
    }

    .input-wrapper {
      position: relative;
    }

    .currency-symbol {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      font-weight: 700;
      color: #7ed321;
    }

    input[type="number"] {
      width: 100%;
      padding: 16px 16px 16px 44px;
      font-size: 1.5rem;
      font-weight: 700;
      background: rgba(10, 20, 16, 0.8);
      border: 2px solid rgba(126, 211, 33, 0.3);
      border-radius: 12px;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      transition: all 0.3s ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #7ed321;
      box-shadow: 0 0 0 4px rgba(126, 211, 33, 0.2);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      flex: 1;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #7ed321, #4caf1a);
      color: white;
      box-shadow: 0 6px 20px rgba(126, 211, 33, 0.4);
    }

    .btn-confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(126, 211, 33, 0.6);
    }

    .btn-confirm:active {
      transform: translateY(0);
    }

    .btn-confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: #b0c4b0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 24px;
      background: rgba(76, 175, 26, 0.2);
      border: 2px solid #4caf1a;
      border-radius: 12px;
      margin-top: 16px;
    }

    .success-message.show {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .success-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .error-message {
      color: #ff4444;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M11,17V16H9V14H13V13H10A1,1 0 0,1 9,12V9A1,1 0 0,1 10,8H11V7H13V8H15V10H11V11H14A1,1 0 0,1 15,12V15A1,1 0 0,1 14,16H13V17H11Z"/>
      </svg>
    </div>

    <h1>Partial Payment</h1>

    <div class="client-info">
      <div class="client-name" id="clientName">Loading...</div>
      <div class="due-amount">
        Full Amount: <strong id="fullAmount">₹0</strong>
      </div>
    </div>

    <form id="partialPaymentForm">
      <div class="form-group">
        <label for="amountReceived">Amount Received</label>
        <div class="input-wrapper">
          <span class="currency-symbol">₹</span>
          <input 
            type="number" 
            id="amountReceived" 
            name="amountReceived"
            min="1"
            step="0.01"
            placeholder="0"
            required
            autofocus
          >
        </div>
        <div class="error-message" id="errorMessage"></div>
      </div>

      <div class="button-group">
        <button type="button" class="btn-cancel" onclick="window.close()">Cancel</button>
        <button type="submit" class="btn-confirm" id="confirmBtn">
          Confirm Payment
        </button>
      </div>
    </form>

    <div class="success-message" id="successMessage">
      <div class="success-icon">✅</div>
      <h2 style="margin-bottom: 8px;">Payment Saved!</h2>
      <p style="color: #b0c4b0;">Closing in 2 seconds...</p>
    </div>
  </div>

  <script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const loanId = urlParams.get('loan_id');
    const clientName = urlParams.get('client_name');
    const fullAmount = parseFloat(urlParams.get('amount')) || 0;

    // Display client info
    document.getElementById('clientName').textContent = clientName || 'Unknown Client';
    document.getElementById('fullAmount').textContent = `₹${fullAmount.toFixed(2)}`;

    // Get JWT token from localStorage
    function getAuthToken() {
      return localStorage.getItem('kf_session_token') || sessionStorage.getItem('kf_session_token');
    }

    // Handle form submission
    document.getElementById('partialPaymentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const amountReceived = parseFloat(document.getElementById('amountReceived').value);
      const errorMessage = document.getElementById('errorMessage');
      const confirmBtn = document.getElementById('confirmBtn');

      // Validate amount
      if (!amountReceived || amountReceived <= 0) {
        errorMessage.textContent = 'Please enter a valid amount';
        errorMessage.classList.add('show');
        return;
      }

      if (amountReceived > fullAmount) {
        errorMessage.textContent = `Amount cannot exceed ₹${fullAmount.toFixed(2)}`;
        errorMessage.classList.add('show');
        return;
      }

      // Hide error
      errorMessage.classList.remove('show');

      // Disable button and show loading
      confirmBtn.disabled = true;
      confirmBtn.innerHTML = '<span class="spinner"></span> Saving...';

      try {
        const token = getAuthToken();
        
        if (!token) {
          throw new Error('Authentication required. Please login.');
        }

        // Send to backend
        const response = await fetch('/api/notify-action', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            loan_id: loanId,
            action: 'partly_paid',
            amount: amountReceived
          })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || 'Failed to save payment');
        }

        // Show success message
        document.getElementById('partialPaymentForm').style.display = 'none';
        document.getElementById('successMessage').classList.add('show');

        // Close window after 2 seconds
        setTimeout(() => {
          window.close();
        }, 2000);

      } catch (error) {
        console.error('Error:', error);
        errorMessage.textContent = error.message;
        errorMessage.classList.add('show');
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Confirm Payment';
      }
    });

    // Validate input on change
    document.getElementById('amountReceived').addEventListener('input', (e) => {
      const errorMessage = document.getElementById('errorMessage');
      const value = parseFloat(e.target.value);

      if (value > fullAmount) {
        errorMessage.textContent = `Amount cannot exceed ₹${fullAmount.toFixed(2)}`;
        errorMessage.classList.add('show');
      } else {
        errorMessage.classList.remove('show');
      }
    });
  </script>
</body>
</html>
