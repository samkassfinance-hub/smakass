<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KaasFlow – Loan &amp; EMI Management</title>
    <meta name="description" content="KaasFlow — Loan & EMI Management for Financiers" />
    <meta property="og:title" content="KaasFlow" />
    <meta property="og:description" content="Manage loans, track EMI collections, and send reminders" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#f7f4ef" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <!-- Loading indicator for mobile -->
      <div id="app-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f7f4ef; color: #1a1614; font-family: 'Space Grotesk', sans-serif;">
        <div style="text-align: center;">
          <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.02em;">
            <span style="color: #1a1614;">Kaas</span><span style="color: #f59e0b;">Flow</span>
          </h1>
          <div style="display: flex; gap: 8px; justify-content: center;">
            <div style="width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; animation: bounce 0.6s ease-in-out infinite;"></div>
            <div style="width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; animation: bounce 0.6s ease-in-out 0.1s infinite;"></div>
            <div style="width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; animation: bounce 0.6s ease-in-out 0.2s infinite;"></div>
          </div>
        </div>
        <style>
          @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
          }
        </style>
      </div>
    </div>
    <!-- Loading fallback for mobile -->
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f7f4ef; color: #1a1614; font-family: sans-serif; padding: 20px; text-align: center;">
        <div>
          <h1>JavaScript Required</h1>
          <p>Please enable JavaScript to use KaasFlow</p>
        </div>
      </div>
    </noscript>
    <!-- Razorpay Checkout Script for payment integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // Hide loader once React mounts
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader && document.querySelector('.app-wrapper, .auth-page')) {
            loader.style.display = 'none';
          }
        }, 100);
      });
    </script>
  </body>
</html>
